name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      run_doxygen:
        description: 'Run the non-blocking Doxygen readiness job'
        required: false
        default: true
        type: boolean

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows
  VCPKG_FEATURE_FLAGS: manifests,binarycaching

jobs:
  format-check:
    runs-on: windows-latest
    name: Clang-Format Check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM (clang-format)
        run: choco install llvm --no-progress --yes
        shell: pwsh

      - name: Verify formatting
        shell: pwsh
        run: |
          $patterns = @(
            'includes/**/*.hpp',
            'includes/**/*.h',
            'includes/**/*.cpp',
            'srcs/**/*.hpp',
            'srcs/**/*.h',
            'srcs/**/*.cpp',
            'tests/**/*.hpp',
            'tests/**/*.h',
            'tests/**/*.cpp',
            'tools/**/*.hpp',
            'tools/**/*.h',
            'tools/**/*.cpp'
          )

          $files = @()
          foreach ($pattern in $patterns) {
            $files += git ls-files -- ":(glob)$pattern"
          }
          $files = $files | Sort-Object -Unique
          if (-not $files) {
            Write-Host "No tracked C/C++ files matched the configured clang-format patterns; skipping."
            exit 0
          }

          $nonCompliant = @()
          foreach ($file in $files) {
            & clang-format --style=file --dry-run --Werror $file
            if ($LASTEXITCODE -ne 0) {
              $nonCompliant += $file
              Write-Host "::error file=$file::clang-format reported style violations. Run clang-format locally; CI does not modify files."
            }
          }

          if ($nonCompliant.Count -gt 0) {
            Write-Host "Non-compliant files ($($nonCompliant.Count)):"
            $nonCompliant | ForEach-Object { Write-Host $_ }

            if ($env:GITHUB_STEP_SUMMARY) {
              $lines = $nonCompliant | ForEach-Object { "- $_" }
              $content = @("### clang-format non-compliant files ($($nonCompliant.Count))", "", $lines) -join "`n"
              $content | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }

            exit 1
          }

          Write-Host "All checked files are clang-format compliant."

  build-and-test:
    needs: format-check
    runs-on: windows-latest
    name: Build & Test (${{ matrix.config }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - config: Debug
            preset: test-debug
          - config: Release
            preset: test-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja --no-progress --yes
        shell: pwsh

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone https://github.com/microsoft/vcpkg.git $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (${{ matrix.config }} - tests enabled)
        shell: pwsh
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (${{ matrix.config }})
        shell: pwsh
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Install Mesa (software OpenGL for tests)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $mesaVersion = "23.3.4"
          $mesaArchive = "mesa3d-$mesaVersion-release-msvc.7z"
          $mesaUrl = "https://github.com/pal1000/mesa-dist-win/releases/download/$mesaVersion/$mesaArchive"
          $mesaDownload = Join-Path $env:RUNNER_TEMP $mesaArchive
          $mesaRoot = Join-Path $env:RUNNER_TEMP "mesa"

          if (-not (Test-Path $mesaDownload)) {
            Invoke-WebRequest $mesaUrl -OutFile $mesaDownload
          }
          7z x $mesaDownload "-o$mesaRoot" | Out-Null

          $mesaBin = Join-Path $mesaRoot "x64"
          $dlls = @("opengl32.dll", "libgallium_wgl.dll", "libglapi.dll")

          $exeDirs = Get-ChildItem -Path "build/${{ matrix.preset }}" -Recurse -Filter *.exe |
            Select-Object -ExpandProperty DirectoryName -Unique

          if ($exeDirs) {
            foreach ($dir in $exeDirs) {
              foreach ($dll in $dlls) {
                if (Test-Path (Join-Path $mesaBin $dll)) {
                  Copy-Item (Join-Path $mesaBin $dll) $dir -Force
                }
              }
            }
          }

          "GALLIUM_DRIVER=llvmpipe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MESA_GL_VERSION_OVERRIDE=4.5" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MESA_GLSL_VERSION_OVERRIDE=450" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run unit tests (${{ matrix.config }})
        shell: pwsh
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --no-tests=error

      - name: Upload TU resources (${{ matrix.config }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tu-resources-${{ matrix.config }}
          path: tests/TUs/resources/**
          if-no-files-found: warn
          retention-days: 30

      - name: Upload CTest logs (${{ matrix.config }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.config }}
          path: build/${{ matrix.preset }}/Testing/**
          if-no-files-found: warn
          retention-days: 30

  documentation-check:
    if: github.event_name == 'workflow_dispatch' && inputs.run_doxygen
    runs-on: windows-latest
    name: Documentation Readiness (Doxygen, manual)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen toolchain
        run: choco install doxygen.portable graphviz --no-progress --yes
        shell: pwsh

      - name: Generate Doxygen documentation
        shell: pwsh
        run: doxygen Doxyfile

      - name: Upload Doxygen warning log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-readiness-log
          path: doxygen-error.log
          if-no-files-found: warn
          retention-days: 7
